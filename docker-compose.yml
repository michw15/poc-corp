version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: corpai_poc
      POSTGRES_USER: corpai
      POSTGRES_PASSWORD: corpai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@corpai.pl
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
