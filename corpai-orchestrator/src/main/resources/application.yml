server:
  port: 8080

spring:
  application:
    name: corpai-orchestrator
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:corpai_poc}
    username: ${DB_USER:corpai}
    password: ${DB_PASSWORD:corpai_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

azure:
  function:
    url: ${AZURE_FUNCTION_URL:http://localhost:7071}
    key: ${AZURE_FUNCTION_KEY:local-dev-key}

logging:
  level:
    pl.corpai: INFO
    org.springframework.web: WARN
